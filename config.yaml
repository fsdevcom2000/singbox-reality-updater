url: "https://example.com/list.txt"

max_nodes: 20
timeout: 2

paths:
  config: "/etc/sing-box/config.json"
  log: "/var/log/singbox-updater.log"

service: "sing-box"

dns:
  - tag: "dns-primary"
    type: "https"
    server: "https://dns.cloudflare.com/dns-query"
    bootstrap: ["1.1.1.1", "1.0.0.1"]

  - tag: "dns-backup"
    type: "https"
    server: "https://dns.google/dns-query"
    bootstrap: ["8.8.8.8", "8.8.4.4"]

tun:
  interface_name: "singbox0"
  address: ["172.19.0.1/30"]
  route_address: ["0.0.0.0/1", "128.0.0.0/1"]
